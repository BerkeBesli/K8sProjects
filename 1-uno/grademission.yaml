apiVersion: v1
kind: Pod
metadata:
  name: grademission
  labels:
    app.kubernetes.io/name: gradesubmission
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: grademission
spec:
  containers:
  - name: grademission
    image: rslim087/kubernetes-course-grade-submission-api:stateless-v4
    resources:
      requests:
        memory: "128Mi"
        cpu: "128m"
      limits: 
        memory: "128Mi"
    ports:
      - containerPort: 3000
  
  - name: grademissionhealth
    image: rslim087/kubernetes-course-grade-submission-api-health-checker
    resources:
      requests:
        memory: "128Mi"
        cpu: "128m"
      limits: 
        memory: "128Mi"
    
