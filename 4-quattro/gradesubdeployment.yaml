apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradesubmissionportal
  namespace: grades
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/instance: gradesub
  template:
    metadata:
      labels:   
        app.kubernetes.io/name: gradesubmission
        app.kubernetes.io/component: frontend      
        app.kubernetes.io/instance: gradesub
        
    spec:
      containers:
      - name: gradesubmissionportal
        image: rslim087/kubernetes-course-grade-submission-portal
        env:
        - name: GRADE_SERVICE_HOST  #bazı uygulamalar environment variable isteğinde bulunur
          value: gradeapiservice
                #bu isteğe karşılık value kısmında verilir
        resources:
          requests: 
            memory: "128Mi"  
            cpu: "200m"      
          limits:  
            memory: "128Mi"
        ports:
          - containerPort: 5001