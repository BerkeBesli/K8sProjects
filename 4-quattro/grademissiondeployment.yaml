apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradesubmissionapi
  namespace: grades
spec:
  replicas: 3
  selector:  #bu kısım deployment ile yaratılacak podların bağlantılı olmasını sağlar
    matchLabels:
      app.kubernetes.io/instance: grademission  #bu labela sahip podlar bulunup deploymentları yönetilir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gradesubmission
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: grademission
    spec:
      containers:
      - name: gradesubmissionapi
        image: rslim087/kubernetes-course-grade-submission-api:stateless-v4
        resources:
          requests:
            memory: "128Mi"
            cpu: "128m"
          limits: 
            memory: "128Mi"
        ports:
          - containerPort: 3000
  